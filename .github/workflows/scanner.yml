# .github/workflows/scanner.yml
# 2시간 단위로 주도주 분석 스크립트를 자동 기동하여 Supabase DB에 적재하는 깃허브 액션 설정입니다.

name: Stock Setup Scanner

on:
  schedule:
    # 2시간 간격으로 매 정각에 실행 (UTC 기준, 한국 시간 대비 -9시간)
    # 월요일부터 금요일까지 장중에 활발히 작동하도록 스케줄 설정
    - cron: '0 */2 * * 1-5'
  workflow_dispatch: # 사용자가 깃허브 웹에서 수동으로 실행 가능하도록 지원

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy yfinance finance-datareader supabase requests lxml

    - name: Execute Stock Scanner
      env:
        # Supabase API 접속용 주소 및 API 키를 GitHub Secrets에서 로드
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        # scripts 폴더에 작성될 파이썬 핵심 스캔 스크립트 실행
        python scripts/scanner.py
